name: Release — Signed APK & AAB

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Decode keystore from repository secret ──────────────────────────
      # Store the base64-encoded keystore as KEYSTORE_BASE64 in GitHub Secrets
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/vexora-release.jks

      # ── Build signed release APK and AAB ───────────────────────────────
      - name: Assemble release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=vexora-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Bundle release AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=vexora-release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      # ── Run tests before publishing ────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew test

      # ── Create GitHub Release with artifacts ───────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Vexora ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab

      # ── Clean up keystore ──────────────────────────────────────────────
      - name: Remove keystore
        if: always()
        run: rm -f app/vexora-release.jks
